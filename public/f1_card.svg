<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 350" width="100%" height="100%">
  <!-- Background Gradient -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#030712" />
    </radialGradient>
    <linearGradient id="kartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#facc15" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glowEffect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Ground / Canvas -->
  <rect width="350" height="350" fill="url(#bgGrad)" />

  <!-- Speed Streaks (Backdrop) -->
  <path d="M-50,220 L400,160" stroke="#f43f5e" stroke-width="4" opacity="0.3" stroke-dasharray="10 15" />
  <path d="M-50,250 L400,190" stroke="#22d3ee" stroke-width="6" opacity="0.4" stroke-dasharray="20 10" />
  <path d="M-50,280 L400,220" stroke="#4ade80" stroke-width="3" opacity="0.3" stroke-dasharray="5 20" />

  <!-- Speedway track lines -->
  <polygon points="-50,350 400,350 250,220 100,220" fill="#1e293b" opacity="0.8" />
  <line x1="175" y1="220" x2="175" y2="350" stroke="#facc15" stroke-width="3" stroke-dasharray="12 12" />

  <!-- Cartoon Sparks / Boost Flames -->
  <path d="M80,245 Q50,255 30,240 Q55,270 85,255 Z" fill="#f43f5e" filter="url(#glowEffect)" />
  <path d="M90,265 Q60,280 40,270 Q65,290 95,275 Z" fill="#22d3ee" filter="url(#glowEffect)" />

  <!-- Procedural Cartoon Kart Body -->
  <!-- Rear Wing -->
  <rect x="70" y="210" width="12" height="40" rx="3" fill="#1e293b" />
  <rect x="65" y="195" width="22" height="15" rx="4" fill="#ef4444" />
  
  <!-- Left Rear Tyre -->
  <rect x="80" y="270" width="38" height="24" rx="6" fill="#111827" stroke="#374151" stroke-width="2" />
  <!-- Right Rear Tyre -->
  <rect x="80" y="180" width="38" height="24" rx="6" fill="#111827" stroke="#374151" stroke-width="2" />

  <!-- Main Chassis -->
  <rect x="90" y="220" width="110" height="36" rx="10" fill="url(#kartGrad)" stroke="#ea580c" stroke-width="2" />
  
  <!-- Sidepods -->
  <path d="M110,210 L150,216 L150,260 L110,266 Z" fill="#ea580c" />
  
  <!-- Nosecone -->
  <path d="M190,225 L240,230 Q250,238 240,246 L190,251 Z" fill="url(#kartGrad)" />
  
  <!-- Front Wing -->
  <rect x="230" y="210" width="12" height="56" rx="3" fill="#1e293b" />
  <rect x="238" y="205" width="6" height="12" rx="1" fill="#ef4444" />
  <rect x="238" y="259" width="6" height="12" rx="1" fill="#ef4444" />

  <!-- Left Front Tyre -->
  <rect x="200" y="266" width="30" height="20" rx="5" fill="#111827" stroke="#374151" stroke-width="1.5" />
  <!-- Right Front Tyre -->
  <rect x="200" y="190" width="30" height="20" rx="5" fill="#111827" stroke="#374151" stroke-width="1.5" />

  <!-- Driver Cockpit & Helmet -->
  <circle cx="145" cy="238" r="16" fill="#1e293b" />
  <!-- Giant Bobblehead Visor Helmet (Lime Green with Neon Blue Visor) -->
  <circle cx="148" cy="238" r="22" fill="#4ade80" stroke="#166534" stroke-width="2" />
  <path d="M152,224 Q172,238 152,252 Z" fill="#22d3ee" stroke="#0891b2" stroke-width="1.5" />
  
  <!-- Number '1' Graphic -->
  <text x="112" y="246" font-family="'Fredoka One', cursive, sans-serif" font-size="20" font-weight="900" fill="#ffffff" opacity="0.9">1</text>

  <!-- Glowing HUD Elements / Text -->
  <text x="175" y="70" font-family="'Fredoka One', cursive, sans-serif" font-size="34" font-weight="900" fill="url(#neonGlow)" text-anchor="middle" filter="url(#glowEffect)">APEX STARS</text>
  <text x="175" y="105" font-family="'Orbitron', sans-serif" font-size="14" font-weight="900" fill="#ffffff" letter-spacing="4" text-anchor="middle" opacity="0.6">CHIBI RACING</text>
</svg>
