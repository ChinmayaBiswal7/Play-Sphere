  <script>
    // Universal error interceptor to log client crashes directly to Node backend console
    window.onerror = (msg, src, line, col, err) => {
      fetch('/log', {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ type: 'error', msg, src, line, col, stack: err?.stack })
      }).catch(() => {});
      return false; // let browser still print to devtools console
    };
    window.onunhandledrejection = (event) => {
      fetch('/log', {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ 
          type: 'unhandled_rejection', 
          msg: event.reason?.message || String(event.reason), 
          stack: event.reason?.stack 
        })
      }).catch(() => {});
    };

    window.addEventListener('unhandledrejection', (e) => {
      fetch('/log', {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          type: 'unhandledrejection',
          msg: e.reason ? String(e.reason.message || e.reason) : 'Unknown promise rejection',
          stack: e.reason ? String(e.reason.stack || '') : ''
        })
      });
    });

    const originalLog = console.log;
    console.log = function(...args) {
      originalLog.apply(console, args);
      const msg = args.map(a => {
        try {
          if (a instanceof Error) return a.stack;
          if (typeof a === 'object' && a !== null) {
            if (a.isAnimationMixer || a.isObject3D) return `[ThreeJS Object: ${a.type || 'Object'}]`;
            return JSON.stringify(a);
          }
          return String(a);
        } catch (e) {
          return '[Unserializable Object]';
        }
      }).join(' ');
      
      if (msg.includes('[Audit]') || msg.includes('mismatch') || msg.includes('[Diagnostic]')) {
        fetch('/log', {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ type: 'log', msg })
        }).catch(() => {});
      }
    };
  </script>
