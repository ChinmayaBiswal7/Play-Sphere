<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 200" width="100%" height="100%">
  <defs>
    <!-- Background linear gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a16" />
      <stop offset="50%" stop-color="#0c1935" />
      <stop offset="100%" stop-color="#1e0c1a" />
    </linearGradient>

    <!-- Sandstone arches gradient -->
    <linearGradient id="sandstoneGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#5c442c" />
      <stop offset="50%" stop-color="#a88059" />
      <stop offset="100%" stop-color="#cbb094" />
    </linearGradient>

    <!-- Cyan glow filter -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Red glow filter -->
    <filter id="redGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 1. Background Grid -->
  <rect width="350" height="200" fill="url(#bgGrad)" />
  <g stroke="rgba(0, 210, 255, 0.05)" stroke-width="0.5">
    <line x1="0" y1="40" x2="350" y2="40" />
    <line x1="0" y1="80" x2="350" y2="80" />
    <line x1="0" y1="120" x2="350" y2="120" />
    <line x1="0" y1="160" x2="350" y2="160" />
    <line x1="70" y1="0" x2="70" y2="200" />
    <line x1="140" y1="0" x2="140" y2="200" />
    <line x1="210" y1="0" x2="210" y2="200" />
    <line x1="280" y1="0" x2="280" y2="200" />
  </g>

  <!-- 2. Heritage Arch silhouette (Varanasi / Jaipur Sandstone style) -->
  <path d="M 60 200 L 60 110 Q 60 70 100 60 Q 140 50 175 50 Q 210 50 250 60 Q 290 70 290 110 L 290 200 Z" fill="url(#sandstoneGrad)" opacity="0.65" />
  <path d="M 90 200 L 90 130 Q 90 100 120 90 Q 150 80 175 80 Q 200 80 230 90 Q 260 100 260 130 L 260 200 Z" fill="#0c1935" />

  <!-- 3. Neon Cyber Grid Lines -->
  <path d="M 20 200 L 140 120 L 210 120 L 330 200" fill="none" stroke="#00d2ff" stroke-width="1.5" filter="url(#cyanGlow)" opacity="0.4" />
  <line x1="175" y1="50" x2="175" y2="200" stroke="#ff3366" stroke-width="1" stroke-dasharray="4 6" opacity="0.3" />

  <!-- 4. Tactical crosshair details -->
  <circle cx="175" cy="100" r="40" fill="none" stroke="#00d2ff" stroke-width="1" stroke-dasharray="5 15" filter="url(#cyanGlow)" />
  <circle cx="175" cy="100" r="3" fill="#ff3366" filter="url(#redGlow)" />
  <line x1="175" y1="45" x2="175" y2="60" stroke="#00d2ff" stroke-width="2" />
  <line x1="175" y1="140" x2="175" y2="155" stroke="#00d2ff" stroke-width="2" />
  <line x1="120" y1="100" x2="135" y2="100" stroke="#00d2ff" stroke-width="2" />
  <line x1="215" y1="100" x2="230" y2="100" stroke="#00d2ff" stroke-width="2" />

  <!-- 5. Logo Text -->
  <text x="175" y="145" text-anchor="middle" font-family="'Orbitron', sans-serif" font-weight="900" font-size="22" fill="#ffffff" letter-spacing="4">DELHI</text>
  <text x="175" y="165" text-anchor="middle" font-family="'Orbitron', sans-serif" font-weight="900" font-size="14" fill="#ff3366" letter-spacing="6" filter="url(#redGlow)">DEFIANCE</text>

  <!-- Cyber corners -->
  <path d="M 10 30 L 10 10 L 30 10" fill="none" stroke="#00d2ff" stroke-width="2" />
  <path d="M 340 30 L 340 10 L 320 10" fill="none" stroke="#00d2ff" stroke-width="2" />
  <path d="M 10 170 L 10 190 L 30 190" fill="none" stroke="#00d2ff" stroke-width="2" />
  <path d="M 340 170 L 340 190 L 320 190" fill="none" stroke="#00d2ff" stroke-width="2" />
</svg>
