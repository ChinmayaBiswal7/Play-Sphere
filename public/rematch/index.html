    <title>F1 Racing — FRIDAY ENGINE</title>
    <script>
      function report(type, msg, stack) {
        try {
          fetch('/log', {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ type, msg, stack })
          });
        } catch (e) {}
      }
      window.onerror = function(message, source, lineno, colno, error) {
        report('error', message, error ? error.stack : '');
      };
      window.onunhandledrejection = function(event) {
        report('unhandledrejection', event.reason ? event.reason.message : '', event.reason ? event.reason.stack : '');
      };
      const origError = console.error;
      console.error = function(...args) {
        report('console.error', args.join(' '), new Error().stack);
        origError.apply(console, args);
      };
    </script>
