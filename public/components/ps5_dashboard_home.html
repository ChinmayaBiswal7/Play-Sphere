<!-- PS5 Console Dashboard Header -->
<div class="ps5-console-wrapper" id="ps5-console-root">
  
  <!-- Top Navigation Bar -->
  <header class="ps5-top-nav" style="position: absolute; top: 0; left: 0; width: 100%; padding: 24px 50px; display: flex; justify-content: space-between; align-items: center; z-index: 100; box-sizing: border-box;">
    <div class="ps5-nav-tabs" style="display: flex; gap: 20px;">
      <button class="ps5-nav-btn active" id="tab-games" style="background: transparent; border: none; color: #ffffff; font-family: 'Orbitron', sans-serif; font-size: 0.95rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; padding: 6px 12px;">Games</button>
      <button class="ps5-nav-btn" id="tab-media" style="background: transparent; border: none; color: rgba(255, 255, 255, 0.5); font-family: 'Orbitron', sans-serif; font-size: 0.95rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; padding: 6px 12px;">Media</button>
    </div>

    <div class="ps5-system-status" style="display: flex; align-items: center; gap: 20px;">
      <!-- Search & Settings -->
      <button class="ps5-icon-btn" id="btn-search" title="Search Games" style="background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; color: #ffffff; cursor: pointer;">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
      </button>

      <!-- Settings Icon Button -->
      <button class="ps5-icon-btn" id="btn-settings" title="Settings" style="background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; color: #ffffff; cursor: pointer;">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
      </button>

      <!-- Profile Avatar Button -->
      <button class="ps5-avatar-btn" id="btn-profile" title="View Profile" style="background: linear-gradient(135deg, #1e3a5f, #0f2040); border: 2px solid #00d2ff; border-radius: 50%; width: 38px; height: 38px; padding: 0; overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 12px rgba(0, 210, 255, 0.4); flex-shrink: 0;">
        <svg id="ps5-user-avatar" viewBox="0 0 38 38" width="38" height="38" fill="none" xmlns="http://www.w3.org/2000/svg" style="border-radius: 50%; display: block; flex-shrink: 0;">
          <circle cx="19" cy="19" r="19" fill="url(#avatarGrad)"/>
          <circle cx="19" cy="15" r="7" fill="rgba(255,255,255,0.85)"/>
          <ellipse cx="19" cy="32" rx="11" ry="8" fill="rgba(255,255,255,0.85)"/>
          <defs><linearGradient id="avatarGrad" x1="0" y1="0" x2="38" y2="38" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#0f2040"/></linearGradient></defs>
        </svg>
      </button>

      <!-- Digital Clock -->
      <span class="ps5-clock" id="ps5-clock-display" style="color: #ffffff; font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 1px;">09:42 PM</span>

      <!-- Controller Connect Button -->
      <button class="ps5-controller-btn" id="btn-controller-pair" style="background: linear-gradient(135deg, rgba(0, 210, 255, 0.15), rgba(99, 102, 241, 0.2)); border: 1px solid rgba(0, 210, 255, 0.4); border-radius: 30px; padding: 8px 16px; display: flex; align-items: center; gap: 8px; color: #ffffff; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 0.7rem; font-weight: 800; letter-spacing: 1px;">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H9v2H7v-2H5v-2h2V9h2v2h2v2zm4.5 1c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm3-3c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
        </svg>
        <span style="display: flex; flex-direction: column; gap: 2px; text-align: left; font-size: 10px; font-weight: bold; letter-spacing: 1px; line-height: 1;">LINK CONTROLLER</span>
      </button>
    </div>
  </header>

  <!-- Games List Shelf -->
  <main class="ps5-main-content" id="ps5-dashboard-view">
    <div class="ps5-game-shelf" id="ps5-shelf">
      <!-- Game Card 1: Lagori 7 Stones 3D -->
      <div class="ps5-game-card selected" data-game="lagori" id="game-lagori">
        <img class="ps5-game-card-img" src="/lagori_card.png" alt="Lagori 7 Stones 3D">
      </div>
      <!-- Game Card 2: Gully Cricket 3D -->
      <div class="ps5-game-card" data-game="gullycricket" id="game-gullycricket">
        <img class="ps5-game-card-img" src="/gully_cricket_card.png" alt="Gully Cricket 3D">
      </div>
      <!-- Game Card 3: Rematch Football -->
      <div class="ps5-game-card" data-game="rematch" id="game-rematch">
        <img class="ps5-game-card-img" src="/rematch_card.png" alt="Rematch Football">
      </div>
      <!-- Game Card 4: Football Pro 2026 -->
      <div class="ps5-game-card" data-game="football" id="game-football">
        <img class="ps5-game-card-img" src="/football_card.png" alt="Football Pro 2026">
      </div>
      <!-- Game Card 5: Cricket Pro 2026 -->
      <div class="ps5-game-card" data-game="cricket" id="game-cricket">
        <img class="ps5-game-card-img" src="/cricket_card.png" alt="Cricket Pro 2026">
      </div>
      <!-- Game Card 6: Apex Stars F1 -->
      <div class="ps5-game-card" data-game="f1" id="game-f1">
        <img class="ps5-game-card-img" src="/f1_card.svg" alt="Apex Stars: Chibi F1">
      </div>
      <!-- Game Card 7: Chibi Tennis Duel -->
      <div class="ps5-game-card" data-game="tennis" id="game-tennis">
        <img class="ps5-game-card-img" src="/tennis_card.png" alt="Chibi Tennis Duel">
      </div>
      <!-- Game Card 8: WWE Chibi Rumble -->
      <div class="ps5-game-card" data-game="wwe" id="game-wwe">
        <img class="ps5-game-card-img" src="/wwe_card.svg" alt="WWE Chibi Rumble">
      </div>
      <!-- Game Card 9: Delhi Defiance -->
      <div class="ps5-game-card" data-game="fps" id="game-fps">
        <img class="ps5-game-card-img" src="/fps_card.png" alt="Delhi Defiance">
      </div>
    </div>

    <!-- Dynamic Game Details Panel -->
    <section class="ps5-game-details visible" id="ps5-details">
      <h1 class="ps5-game-title" id="game-title">Lagori 7 Stones 3D</h1>
      <div class="ps5-game-meta">
        <span class="ps5-rating-pill">ESRB: E</span>
        <span>⭐ 5.0 Rating</span>
        <span>DeepMind India Arcade</span>
      </div>
      <p class="ps5-game-desc" id="game-desc">
        Traditional Indian 3D street game! Throw the tennis ball to knock down the 7-stone stack, run to pick up scattered stones, and rebuild the tower at the center pedestal while dodging defender throws!
      </p>
      <button class="ps5-play-btn" id="ps5-play-game">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        Play Game
      </button>
    </section>
  </main>
</div>
