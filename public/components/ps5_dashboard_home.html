<!-- PS5 Console Dashboard Home -->
<div class="ps5-console-wrapper" id="ps5-console-root">

  <!-- Particle canvas -->
  <canvas id="ps5-bg-canvas"></canvas>

  <!-- Dynamic hero background (blurred selected game art) -->
  <div class="psd-hero-bg" id="psd-hero-bg"></div>
  <div class="psd-hero-overlay"></div>

  <!-- Top Navigation Bar -->
  <header class="psd-topbar">
    <div class="psd-tabs">
      <button class="psd-tab active" id="tab-games">Games</button>
      <button class="psd-tab" id="tab-media">Media</button>
    </div>
    <div class="psd-actions">
      <button class="psd-icon-btn" id="btn-search" title="Search">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </button>
      <button class="psd-icon-btn" id="btn-settings" title="Settings">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </button>
      <button class="psd-icon-btn" id="btn-friends" title="Friends">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      </button>
      <button class="psd-avatar-btn" id="btn-profile" title="Profile">
        <svg id="ps5-user-avatar" viewBox="0 0 38 38" width="38" height="38" fill="none">
          <circle cx="19" cy="19" r="19" fill="#1e3a5f"/>
          <circle cx="19" cy="15" r="7" fill="rgba(255,255,255,0.9)"/>
          <ellipse cx="19" cy="32" rx="11" ry="8" fill="rgba(255,255,255,0.9)"/>
        </svg>
      </button>
      <span class="psd-clock" id="ps5-clock-display">00:00 AM</span>
      <button class="psd-controller-btn" id="btn-controller-pair">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H9v2H7v-2H5v-2h2V9h2v2h2v2zm4.5 1c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm3-3c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
        LINK CONTROLLER
      </button>
    </div>
  </header>

  <!-- HERO SECTION: fills empty space with selected game info -->
  <section class="psd-hero" id="psd-hero">
    <div class="psd-hero-content visible" id="ps5-details">
      <p class="psd-hero-eyebrow" id="game-dev">DeepMind India Arcade</p>
      <h1 class="psd-game-title" id="game-title">Lagori 7 Stones 3D</h1>
      <div class="psd-game-meta">
        <span class="psd-rating-pill" id="game-pill">ESRB: E</span>
        <span id="game-rating">⭐ 5.0 Rating</span>
      </div>
      <p class="psd-game-desc" id="game-desc">Traditional Indian 3D street game! Throw the tennis ball to knock down the 7-stone stack, run to pick up scattered stones, and rebuild the tower at the center pedestal while dodging defender throws!</p>
      <button class="psd-play-btn" id="ps5-play-game">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Play Game
      </button>
    </div>
  </section>

  <!-- GAME CARD SHELF -->
  <div class="psd-shelf-section">
    <div class="psd-shelf" id="ps5-shelf">
      <div class="psd-card selected" data-game="lagori" id="game-lagori">
        <img class="psd-card-img" src="/lagori_card.png" alt="Lagori 7 Stones 3D">
      </div>
      <div class="psd-card" data-game="gullycricket" id="game-gullycricket">
        <img class="psd-card-img" src="/gully_cricket_card.png" alt="Gully Cricket 3D">
      </div>
      <div class="psd-card" data-game="rematch" id="game-rematch">
        <img class="psd-card-img" src="/rematch_card.png" alt="Rematch Football">
      </div>
      <div class="psd-card" data-game="football" id="game-football">
        <img class="psd-card-img" src="/football_card.png" alt="Football Pro 2026">
      </div>
      <div class="psd-card" data-game="cricket" id="game-cricket">
        <img class="psd-card-img" src="/cricket_card.png" alt="Cricket Pro 2026">
      </div>
      <div class="psd-card" data-game="f1" id="game-f1">
        <img class="psd-card-img" src="/f1_card.svg" alt="Apex Stars Chibi F1">
      </div>
      <div class="psd-card" data-game="tennis" id="game-tennis">
        <img class="psd-card-img" src="/tennis_card.png" alt="Chibi Tennis Duel">
      </div>
      <div class="psd-card" data-game="wwe" id="game-wwe">
        <img class="psd-card-img" src="/wwe_card.svg" alt="WWE Chibi Rumble">
      </div>
      <div class="psd-card" data-game="fps" id="game-fps">
        <img class="psd-card-img" src="/fps_card.png" alt="Delhi Defiance">
      </div>
    </div>
  </div>

  <!-- Launch overlay -->
  <div class="psd-launch-overlay" id="ps5-launch">
    <div class="psd-launch-logo">
      <svg viewBox="0 0 100 100" width="55" height="55" fill="none">
        <circle cx="50" cy="50" r="32" stroke="#3b82f6" stroke-width="5"/>
        <ellipse cx="50" cy="50" rx="42" ry="15" stroke="#3b82f6" stroke-width="3.5" transform="rotate(-30 50 50)" stroke-dasharray="120 40"/>
        <ellipse cx="50" cy="50" rx="42" ry="15" stroke="#60a5fa" stroke-width="3" transform="rotate(30 50 50)" stroke-dasharray="100 60"/>
        <circle cx="50" cy="50" r="13" fill="#fff" opacity="0.9"/>
      </svg>
    </div>
    <div class="psd-launch-bar"><div class="psd-launch-bar-fill"></div></div>
  </div>

</div>
