  <!-- LBW Appeal Prompt Overlay -->

    <div class="drs-prompt-header" style="background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);">LBW APPEAL</div>

          <path id="lbw-appeal-timer-progress" class="drs-timer-progress" stroke="#3b82f6" stroke-dasharray="100, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
        </svg>
        <div id="lbw-appeal-timer-value" class="drs-timer-value">3</div>
      </div>

    <div class="drs-prompt-footer">
      <button id="lbw-btn-appeal" class="drs-btn" style="background: #3b82f6; cursor: pointer;">APPEAL (SPACE)</button>
      <button id="lbw-btn-decline" class="drs-btn drs-btn-decline" style="cursor: pointer;">DECLINE (X)</button>

  <!-- DRS Review Prompt Overlay -->
  <div id="drs-prompt-card" class="drs-prompt-card hidden">
    <div class="drs-prompt-header">DECISION REVIEW SYSTEM</div>
    <div class="drs-prompt-body">
      <div class="drs-prompt-text">CHALLENGE UMPIRE'S DECISION?</div>
      <div class="drs-timer-container">
        <svg class="drs-timer-svg" viewBox="0 0 36 36">
          <path class="drs-timer-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          <path id="drs-timer-progress" class="drs-timer-progress" stroke-dasharray="100, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
        </svg>
        <div id="drs-timer-value" class="drs-timer-value">10</div>
      </div>
    </div>
    <div class="drs-prompt-footer">
      <button id="drs-btn-approve" class="drs-btn drs-btn-approve">DRS REVIEW (SPACE)</button>
      <button id="drs-btn-decline" class="drs-btn drs-btn-decline">DECLINE (X)</button>

  <!-- DRS Review Graphic Overlays (TV Broadcast Style) -->
  <div id="drs-review-container" class="drs-review-container hidden">
    <!-- Top Original Decision Card -->
    <div class="drs-decision-card top-card">
      <div class="drs-decision-label">ORIGINAL DECISION</div>
      <div id="drs-original-decision-value" class="drs-decision-value out">OUT</div>
    </div>

    <!-- Left Tracking Panel -->
    <div class="drs-tracking-panel">
      <!-- Pitching -->
      <div id="drs-panel-pitching" class="drs-tracking-item pending">
        <div class="drs-item-title">PITCHING</div>
        <div class="drs-item-value">-</div>
      </div>
      <!-- Impact -->
      <div id="drs-panel-impact" class="drs-tracking-item pending">
        <div class="drs-item-title">IMPACT</div>
        <div class="drs-item-value">-</div>
      </div>
      <!-- Wickets -->
      <div id="drs-panel-wickets" class="drs-tracking-item pending">

    <!-- Bottom Right Final Decision / Review Status Card -->
    <div class="drs-decision-card bottom-right-card hidden" id="drs-final-card">

      <div id="drs-review-status-value" class="drs-review-status">REVIEW RETAINED</div>
    </div>
  </div>
