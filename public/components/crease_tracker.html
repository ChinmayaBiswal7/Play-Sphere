<!-- Crease Running Tracker (Pitch horizontal visualizer) -->
  <div id="crease-tracker-container" class="crease-tracker hidden">
    <div class="crease-track-pitch">
      <div class="crease-wk-icon">WK</div>
      <div class="crease-wickets left-wickets">
        <div class="stump"></div>
        <div class="stump"></div>
        <div class="stump"></div>
      </div>
      <div class="crease-pitch-markings"></div>
      <div class="crease-track-line">
        <div id="crease-striker-dot" class="crease-runner striker-runner">
          <svg viewBox="0 0 64 64" width="30" height="30" style="transform: scaleX(1);">
            <!-- Head/Helmet -->
            <circle cx="32" cy="12" r="5" fill="#ffffff" />
            <circle cx="34" cy="11" r="3.5" fill="#3b82f6" />
            <!-- Torso -->
            <path d="M 28 17 L 38 22 L 34 38 L 24 33 Z" fill="#3b82f6" />
            <!-- Left Leg -->
            <path d="M 28 36 L 36 46 L 33 54" stroke="#3b82f6" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            <path d="M 33 54 L 37 55" stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" />
            <!-- Right Leg -->
            <path d="M 32 35 L 20 44 L 14 40" stroke="#3b82f6" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            <path d="M 14 40 L 12 42" stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" />
            <!-- Arms & Bat -->
            <path d="M 34 20 L 44 26 L 46 34" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round" fill="none" />
            <path d="M 30 18 L 38 28 L 46 34" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round" fill="none" />
            <path d="M 46 34 L 56 44 L 53 47 L 43 37 Z" fill="#eab308" stroke="#78350f" stroke-width="1" />
            <path d="M 46 34 L 43 31" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
          </svg>
        </div>
        <div id="crease-nonstriker-dot" class="crease-runner nonstriker-runner">
          <svg viewBox="0 0 64 64" width="30" height="30" style="transform: scaleX(-1);">
            <!-- Head/Helmet -->
            <circle cx="32" cy="12" r="5" fill="#ffffff" />
            <circle cx="34" cy="11" r="3.5" fill="#3b82f6" />
            <!-- Torso -->
            <path d="M 28 17 L 38 22 L 34 38 L 24 33 Z" fill="#3b82f6" />
            <!-- Left Leg -->
            <path d="M 28 36 L 36 46 L 33 54" stroke="#3b82f6" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            <path d="M 33 54 L 37 55" stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" />
            <!-- Right Leg -->
            <path d="M 32 35 L 20 44 L 14 40" stroke="#3b82f6" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            <path d="M 14 40 L 12 42" stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" />
            <!-- Arms & Bat -->
            <path d="M 34 20 L 44 26 L 46 34" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round" fill="none" />
            <path d="M 30 18 L 38 28 L 46 34" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round" fill="none" />
            <path d="M 46 34 L 56 44 L 53 47 L 43 37 Z" fill="#eab308" stroke="#78350f" stroke-width="1" />
            <path d="M 46 34 L 43 31" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
          </svg>
        </div>
      </div>
      <div class="crease-wickets right-wickets">
        <div class="stump"></div>
        <div class="stump"></div>
        <div class="stump"></div>
      </div>
    </div>
  </div>
