<!-- 6. Game Over Screen Overlay -->
  <div id="game-over-screen" class="overlay-screen hidden">
    <div class="game-over-box">
      <h2 id="end-title" class="victory">Match Finished</h2>
      <p id="end-subtitle" class="game-over-summary">You successfully chased down the target!</p>
      
      <div class="final-scorecard">
        <div class="scorecard-item">
          <span>Total Score</span>
          <strong id="end-score">24/1</strong>
        </div>
        <div class="scorecard-item">
          <span>Overs Faced</span>
          <strong id="end-overs">1.4</strong>
        </div>
        <div class="scorecard-item">
          <span>Run Rate</span>
          <strong id="end-runrate">14.4</strong>
        </div>
      </div>

      <!-- Wagon Wheel Canvas -->
      <div class="wagon-wheel-panel" style="margin: 15px 0 20px 0; display: flex; flex-direction: column; align-items: center;">
        <span style="font-size: 0.75rem; font-weight: 800; letter-spacing: 2px; color: #a1a1aa; margin-bottom: 8px; text-transform: uppercase;">Wagon Wheel</span>
        <canvas id="wagon-wheel-canvas" width="160" height="160" style="background: rgba(15, 23, 42, 0.6); border: 2px solid rgba(236, 72, 153, 0.4); border-radius: 50%;"></canvas>
      </div>

      <!-- Action buttons at Game Over -->
      <button id="end-restart-btn" class="menu-btn primary" style="margin-bottom: 12px; width: 100%;">
        PLAY AGAIN
      </button>
      <button id="end-menu-btn" class="menu-btn" style="width: 100%;">
        MAIN MENU
      </button>
    </div>
  </div>
