<!-- 8. User Profile Details Modal -->
  <div id="profile-modal" class="overlay-screen hidden">
    <div class="profile-card-box">
      <div class="profile-card-header">
        <h2>PLAYER CAREER PROFILE</h2>
        <button id="profile-close-btn" class="close-btn">&times;</button>
      </div>
      <div class="profile-card-body">
        <div class="avatar-section">
          <div id="profile-avatar-container" class="avatar-large">👤</div>
          <div class="profile-details-txt">
            <input type="text" id="profile-username-input" class="username-input" value="MAC_VERUS" maxlength="12">
            <span class="edit-hint">Click name to edit & press Enter</span>
          </div>
        </div>

        <div class="profile-auth-buttons" style="margin-top: 15px; margin-bottom: 20px; display: flex; gap: 12px; width: 100%;">
          <button id="profile-login-btn" class="google-sign-in-btn" style="width: 100%;">
            <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18" style="margin-right: 8px; vertical-align: middle;">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22-.19-.63z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
            </svg>
            Sign in with Google
          </button>
          <button id="profile-logout-btn" class="logout-btn hidden" style="width: 100%;">
            Sign Out
          </button>
        </div>
        
        <div class="xp-level-stats">
          <div class="lvl-number" id="profile-card-level">LEVEL 1</div>
          <div class="xp-details-wrap">
            <span class="xp-val" id="profile-card-xp">0 / 500 XP</span>
            <div class="xp-progress-bar"><div class="xp-fill" id="profile-card-xp-fill" style="width: 0%;"></div></div>
          </div>
        </div>

        <div class="career-stats-grid">
          <div class="stat-box">
            <span class="stat-lbl">Matches Played</span>
            <strong id="profile-stats-played">0</strong>
          </div>
          <div class="stat-box">
            <span class="stat-lbl">Matches Won</span>
            <strong id="profile-stats-won">0</strong>
          </div>
          <div class="stat-box">
            <span class="stat-lbl">Matches Lost</span>
            <strong id="profile-stats-lost">0</strong>
          </div>
          <div class="stat-box">
            <span class="stat-lbl">Runs Scored</span>
            <strong id="profile-stats-runs">0</strong>
          </div>
          <div class="stat-box">
            <span class="stat-lbl">Wickets Taken</span>
            <strong id="profile-stats-wickets">0</strong>
          </div>
          <div class="stat-box">
            <span class="stat-lbl">Win Ratio</span>
            <strong id="profile-stats-winratio">0%</strong>
          </div>
        </div>
      </div>
    </div>
  </div>
