<!-- Team Selection Grid Overlay -->
<div id="team-selection-overlay" class="fc-menu-screen hidden">
  <div class="team-sel-container">
    <!-- Top League Tabs -->
    <div class="team-sel-tabs" id="team-sel-league-tabs">
      <div class="team-sel-tab active" data-league="INTERNATIONAL">INTERNATIONAL</div>
      <div class="team-sel-tab" data-league="INDIAN_T20_LEAGUE">INDIAN T20 LEAGUE</div>
      <div class="team-sel-tab" data-league="BIG_BASH_LEAGUE">BIG BASH LEAGUE</div>
      <div class="team-sel-tab" data-league="THE_HUNDRED">THE HUNDRED</div>
      <div class="team-sel-tab" data-league="PAKISTAN_SUPER_LEAGUE">PAKISTAN SUPER LEAGUE</div>
    </div>

    <!-- Main Teams Grid -->
    <div class="team-sel-grid-container">
      <div class="team-sel-grid" id="team-sel-grid">
        <!-- populated dynamically -->
      </div>
    </div>

    <!-- Bottom Footer Status / Hints -->
    <div class="team-sel-footer">
      <div class="team-sel-footer-info">
        <span class="sel-highlight" id="team-sel-target-label">SELECTING HOME TEAM</span>
      </div>
      <div class="team-sel-hints">
        <div class="hint-item"><kbd class="key-hint">[Q]/[E]</kbd> <span class="btn-bubble option-btn">L1/R1</span> Cycle Leagues</div>
        <div class="hint-item"><kbd class="key-hint">[Enter]</kbd> <span class="btn-bubble confirm-btn">✕</span> Select</div>
        <div class="hint-item"><kbd class="key-hint">[Esc]</kbd> <span class="btn-bubble cancel-btn">○</span> Back</div>
      </div>
    </div>
  </div>
</div>
