<!-- Friends Modal -->
<div class="ps5-profile-modal" id="ps5-friends-modal">
  <div id="ps5-friends-card">
    <!-- Close Button -->
    <span class="ps5-profile-close" id="ps5-friends-close-btn">&times;</span>

    <!-- LEFT COLUMN: Friends List -->
    <div class="friends-left-col">
      <!-- Column Header -->
      <div class="friends-col-header">
        <div class="friends-header-icon-wrap">
          <div class="friends-header-icon">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="white"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
          </div>
          <div class="friends-header-title-text">
            <div class="friends-title-main">Friends List</div>
            <div class="friends-title-sub">PlaySphere Network</div>
          </div>
        </div>
      </div>

      <!-- Pending Invites Section -->
      <div id="ps5-friend-requests-section" class="hidden">
        <div class="friends-pending-label">
          <div class="friends-pending-dot"></div>
          <span>Pending Invites</span>
        </div>
        <div id="ps5-friend-requests-list"></div>
      </div>

      <!-- Friends Scroll List -->
      <div id="ps5-friends-list-container">
        <div class="friends-empty-state">
          <svg viewBox="0 0 24 24" width="36" height="36" fill="rgba(255,255,255,0.3)"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
          <div class="friends-empty-txt">No friends added yet.<br><span>Search by username to add people.</span></div>
        </div>
      </div>
    </div>

    <!-- RIGHT COLUMN: Add Friend + Your ID -->
    <div class="friends-right-col">
      <!-- Column Header -->
      <div class="friends-add-header">
        <div class="friends-add-title">Add a Friend</div>
        <div class="friends-add-sub">Search by Username</div>
      </div>

      <!-- Search Box -->
      <div class="friends-search-box">
        <div class="friends-search-input-wrap">
          <svg class="friends-search-svg" viewBox="0 0 24 24" width="14" height="14" fill="white"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="text" id="ps5-friend-search-input" placeholder="Enter username..." />
        </div>
        <button id="ps5-friend-search-btn">Search</button>
      </div>
      <div id="ps5-friend-search-result"></div>

      <!-- Your Friend ID -->
      <div class="friends-my-id-section">
        <div>
          <div class="friends-my-id-label">Your Friend ID</div>
          <div class="friends-my-id-box">
            <div>
              <div id="ps5-my-username-display">Gamer</div>
              <div class="friends-my-id-hint">Share this with friends</div>
            </div>
            <button id="ps5-copy-username-btn">Copy</button>
          </div>
        </div>

        <!-- Tip box -->
        <div class="friends-tip-box">
          💡 Friends who are online will appear with a <span class="friends-online-highlight">green</span> dot and their current activity.
        </div>
      </div>
    </div>
  </div>
</div>
