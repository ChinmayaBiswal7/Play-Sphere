<!-- Shot Rating Card (Timing, Footwork, Shot Choice) -->
  <div id="shot-rating-card" class="shot-card hidden">
    <div class="shot-card-title">SHOT RATINGS</div>
    <div class="shot-card-row">
      <span class="shot-card-label">FOOTWORK</span>
      <span id="rating-footwork" class="shot-badge">IDEAL</span>
    </div>
    <div class="shot-card-row">
      <span class="shot-card-label">TIMING</span>
      <span id="rating-timing" class="shot-badge">GOOD</span>
    </div>
    <div class="shot-card-row">
      <span class="shot-card-label">SHOT CHOICE</span>
      <span id="rating-choice" class="shot-badge">POOR</span>
    </div>
  </div>
