<div id="match-loading-screen" class="overlay-screen hidden">
    <div class="match-loading-box">
      <div class="match-loading-header">
        <div class="loading-league">APEX CHAMPIONS TROPHY</div>
        <div class="loading-vs">WESTERN FLIER <span class="vs-glow">VS</span> SHINING STARS</div>
      </div>
      
      <div class="match-loading-content">
        <div class="match-loading-art">
          <!-- Stylized glow container for tips and logs -->
          <div class="loading-logs" id="loading-logs-container">
            <div class="log-line active" id="log-1">Loading Match...</div>
            <div class="log-line" id="log-2">Player Profile Loaded ✓</div>
            <div class="log-line" id="log-3">Pitch Prepared ✓</div>
            <div class="log-line" id="log-4">Crowd Entering Stadium ✓</div>
            <div class="log-line" id="log-5">Match Ready ✓</div>
          </div>
        </div>
        <div class="loading-tip-container">
          <span class="tip-title">GAMEPLAY TIP</span>
          <p id="loading-tip" class="tip-text">Time your shots carefully to clear the ropes!</p>
        </div>
      </div>

      <div class="match-loading-footer">
        <div class="loader-status">
          <span class="loading-label" id="loading-status-txt">SYNCING FIELD STATIONS...</span>
          <span class="loading-percentage" id="loading-pct">0%</span>
        </div>
        <div class="match-loader-bar-wrapper">
          <div id="match-loader-bar" class="match-loader-bar"></div>
        </div>
      </div>
    </div>
  </div>
